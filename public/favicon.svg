<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1a1a2e"/>
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#goldGradient)" stroke-width="3"/>
  <!-- Dancing couple silhouette - stylized J&J -->
  <text x="50" y="42" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="url(#goldGradient)" text-anchor="middle">J</text>
  <text x="38" y="72" font-family="Georgia, serif" font-size="20" fill="url(#goldGradient)" text-anchor="middle">&amp;</text>
  <text x="62" y="72" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="url(#goldGradient)" text-anchor="middle">J</text>
  <!-- Sparkle accents -->
  <circle cx="25" cy="25" r="2" fill="#f59e0b" opacity="0.8"/>
  <circle cx="75" cy="30" r="1.5" fill="#fbbf24" opacity="0.6"/>
  <circle cx="80" cy="70" r="2" fill="#f59e0b" opacity="0.7"/>
  <circle cx="20" cy="75" r="1.5" fill="#fbbf24" opacity="0.5"/>
</svg>
